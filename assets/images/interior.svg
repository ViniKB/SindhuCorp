<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EEDC"/>
      <stop offset="100%" stop-color="#E5DAC0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6A3E"/>
      <stop offset="100%" stop-color="#5B421F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="440" fill="url(#wall)"/>
  <rect y="440" width="800" height="160" fill="url(#floor)"/>
  <!-- Window -->
  <rect x="60" y="80" width="220" height="260" fill="#7EA9C2" opacity=".6"/>
  <rect x="60" y="80" width="220" height="260" fill="none" stroke="#5B421F" stroke-width="6"/>
  <line x1="170" y1="80" x2="170" y2="340" stroke="#5B421F" stroke-width="4"/>
  <line x1="60" y1="210" x2="280" y2="210" stroke="#5B421F" stroke-width="4"/>
  <!-- Curtain -->
  <rect x="40" y="70" width="24" height="300" fill="#C9A24A" opacity=".7"/>
  <rect x="276" y="70" width="24" height="300" fill="#C9A24A" opacity=".7"/>
  <!-- Sofa -->
  <rect x="340" y="330" width="340" height="110" rx="14" fill="#0F2A44"/>
  <rect x="340" y="310" width="340" height="30" rx="10" fill="#1B3A5B"/>
  <rect x="360" y="340" width="90" height="70" rx="8" fill="#1B3A5B"/>
  <rect x="460" y="340" width="90" height="70" rx="8" fill="#1B3A5B"/>
  <rect x="560" y="340" width="90" height="70" rx="8" fill="#1B3A5B"/>
  <!-- Cushions -->
  <rect x="374" y="348" width="60" height="22" rx="4" fill="#C9A24A"/>
  <rect x="474" y="348" width="60" height="22" rx="4" fill="#F2EDE2"/>
  <rect x="574" y="348" width="60" height="22" rx="4" fill="#C9A24A"/>
  <!-- Coffee table -->
  <rect x="420" y="490" width="180" height="50" rx="6" fill="#2D1F10"/>
  <rect x="430" y="540" width="10" height="30" fill="#2D1F10"/>
  <rect x="580" y="540" width="10" height="30" fill="#2D1F10"/>
  <!-- Lamp -->
  <circle cx="720" cy="280" r="26" fill="#C9A24A" opacity=".85"/>
  <rect x="716" y="300" width="8" height="140" fill="#2D1F10"/>
  <!-- Plant -->
  <rect x="100" y="460" width="50" height="60" fill="#2D1F10"/>
  <ellipse cx="125" cy="440" rx="40" ry="30" fill="#1E7F5B"/>
  <ellipse cx="115" cy="425" rx="28" ry="20" fill="#2D9466"/>
  <!-- Art -->
  <rect x="380" y="120" width="260" height="150" fill="#0F2A44"/>
  <rect x="380" y="120" width="260" height="150" fill="none" stroke="#C9A24A" stroke-width="4"/>
  <circle cx="510" cy="195" r="36" fill="#C9A24A" opacity=".8"/>
  <rect x="420" y="225" width="180" height="30" fill="#1B3A5B"/>
</svg>
