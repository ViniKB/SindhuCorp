      <rect x="510" y="330" width="8" height="14"/><rect x="530" y="330" width="8" height="14"/><rect x="550" y="330" width="8" height="14"/><rect x="570" y="330" width="8" height="14" opacity=".4"/><rect x="590" y="330" width="8" height="14"/><rect x="610" y="330" width="8" height="14"/><rect x="630" y="330" width="8" height="14"/>
      <rect x="510" y="360" width="8" height="14" opacity=".4"/><rect x="530" y="360" width="8" height="14"/><rect x="550" y="360" width="8" height="14"/><rect x="570" y="360" width="8" height="14"/><rect x="590" y="360" width="8" height="14" opacity=".4"/><rect x="610" y="360" width="8" height="14"/><rect x="630" y="360" width="8" height="14"/>
      <rect x="510" y="390" width="8" height="14"/><rect x="530" y="390" width="8" height="14" opacity=".4"/><rect x="550" y="390" width="8" height="14"/><rect x="570" y="390" width="8" height="14"/><rect x="590" y="390" width="8" height="14"/><rect x="610" y="390" width="8" height="14"/><rect x="630" y="390" width="8" height="14" opacity=".4"/>
