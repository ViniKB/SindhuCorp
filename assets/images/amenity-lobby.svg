<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#E0D5B8"/>
    </linearGradient>
    <linearGradient id="lf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A24A"/>
      <stop offset="100%" stop-color="#8D6C29"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#lw)"/>
  <rect y="430" width="800" height="170" fill="url(#lf)"/>
  <!-- Ceiling lights -->
  <g fill="#C9A24A" opacity=".85">
    <circle cx="150" cy="70" r="20"/>
    <circle cx="400" cy="70" r="20"/>
    <circle cx="650" cy="70" r="20"/>
  </g>
  <!-- Columns -->
  <g fill="#D4C9AC">
    <rect x="80" y="120" width="40" height="310"/>
    <rect x="680" y="120" width="40" height="310"/>
  </g>
  <!-- Reception desk -->
  <rect x="240" y="310" width="320" height="120" fill="#3A2E1C"/>
  <rect x="240" y="300" width="320" height="20" fill="#5B421F"/>
  <rect x="260" y="330" width="280" height="20" fill="#C9A24A" opacity=".6"/>
  <!-- Logo panel behind -->
  <rect x="260" y="140" width="280" height="150" fill="#0F2A44"/>
  <text x="400" y="230" font-family="Playfair Display, Georgia, serif" font-size="48" fill="#C9A24A" text-anchor="middle" font-weight="700">S</text>
  <!-- Plants -->
  <g>
    <rect x="150" y="370" width="50" height="60" fill="#2D1F10"/>
    <ellipse cx="175" cy="350" rx="40" ry="28" fill="#1E7F5B"/>
  </g>
  <g>
    <rect x="610" y="370" width="50" height="60" fill="#2D1F10"/>
    <ellipse cx="635" cy="350" rx="40" ry="28" fill="#1E7F5B"/>
  </g>
  <!-- Chandelier -->
  <g>
    <line x1="400" y1="90" x2="400" y2="150" stroke="#8D6C29" stroke-width="3"/>
    <circle cx="400" cy="160" r="30" fill="#C9A24A" opacity=".85"/>
    <circle cx="370" cy="175" r="8" fill="#C9A24A"/>
    <circle cx="430" cy="175" r="8" fill="#C9A24A"/>
    <circle cx="400" cy="185" r="8" fill="#C9A24A"/>
  </g>
</svg>
