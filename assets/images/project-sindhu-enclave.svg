<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3A5B"/>
      <stop offset="100%" stop-color="#081A2C"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D5BC84"/>
      <stop offset="100%" stop-color="#8D6C29"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g1)"/>
  <circle cx="140" cy="100" r="50" fill="#C9A24A" opacity=".25"/>
  <!-- Tower -->
  <rect x="250" y="100" width="300" height="460" fill="url(#b1)" opacity=".92"/>
  <rect x="250" y="100" width="300" height="20" fill="#C9A24A"/>
  <!-- Windows -->
  <g fill="#0F2A44" opacity=".55">
    <g id="floor">
      <rect x="270" y="140" width="28" height="36"/>
      <rect x="310" y="140" width="28" height="36"/>
      <rect x="350" y="140" width="28" height="36"/>
      <rect x="390" y="140" width="28" height="36"/>
      <rect x="430" y="140" width="28" height="36"/>
      <rect x="470" y="140" width="28" height="36"/>
      <rect x="510" y="140" width="28" height="36"/>
    </g>
    <use href="#floor" y="44"/>
    <use href="#floor" y="88"/>
    <use href="#floor" y="132"/>
    <use href="#floor" y="176"/>
    <use href="#floor" y="220"/>
    <use href="#floor" y="264"/>
    <use href="#floor" y="308"/>
    <use href="#floor" y="352"/>
  </g>
  <!-- Entrance -->
  <rect x="370" y="520" width="60" height="40" fill="#0F2A44"/>
  <!-- Palms -->
  <g>
    <rect x="180" y="440" width="6" height="120" fill="#2D1F10"/>
    <ellipse cx="183" cy="430" rx="40" ry="16" fill="#1E7F5B" opacity=".85"/>
    <ellipse cx="183" cy="420" rx="28" ry="14" fill="#1E7F5B" opacity=".7"/>
    <rect x="610" y="460" width="6" height="100" fill="#2D1F10"/>
    <ellipse cx="613" cy="450" rx="36" ry="14" fill="#1E7F5B" opacity=".8"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="560" width="800" height="40" fill="#0B1F34"/>
</svg>
