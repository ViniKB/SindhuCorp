<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="us" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C97A5B"/>
      <stop offset="100%" stop-color="#2A4865"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#us)"/>
  <circle cx="620" cy="150" r="56" fill="#F5D99E" opacity=".85"/>
  <!-- Single main tower -->
  <rect x="240" y="140" width="320" height="420" fill="#F2EDE2"/>
  <rect x="240" y="140" width="320" height="18" fill="#8D6C29"/>
  <!-- Accent trim -->
  <rect x="240" y="300" width="320" height="8" fill="#C9A24A" opacity=".7"/>
  <rect x="240" y="440" width="320" height="8" fill="#C9A24A" opacity=".7"/>
  <!-- Windows -->
  <g fill="#0F2A44" opacity=".6">
    <g id="uw">
      <rect x="260" y="180" width="28" height="36"/>
      <rect x="298" y="180" width="28" height="36"/>
      <rect x="336" y="180" width="28" height="36"/>
      <rect x="374" y="180" width="28" height="36"/>
      <rect x="412" y="180" width="28" height="36"/>
      <rect x="450" y="180" width="28" height="36"/>
      <rect x="488" y="180" width="28" height="36"/>
      <rect x="526" y="180" width="28" height="36"/>
    </g>
    <use href="#uw" y="50"/>
    <use href="#uw" y="140"/>
    <use href="#uw" y="190"/>
    <use href="#uw" y="280"/>
    <use href="#uw" y="330"/>
  </g>
  <!-- Entrance -->
  <rect x="370" y="510" width="60" height="50" fill="#0F2A44"/>
  <rect x="380" y="520" width="40" height="40" fill="#C9A24A" opacity=".4"/>
  <rect x="0" y="560" width="800" height="40" fill="#0B1F34"/>
  <!-- Street elements -->
  <g>
    <rect x="100" y="500" width="6" height="70" fill="#2D1F10"/>
    <circle cx="103" cy="490" r="12" fill="#C9A24A"/>
  </g>
  <g>
    <rect x="700" y="500" width="6" height="70" fill="#2D1F10"/>
    <circle cx="703" cy="490" r="12" fill="#C9A24A"/>
  </g>
</svg>
