  </g>
  <!-- Dumbbells -->
  <g>
    <rect x="120" y="480" width="80" height="14" rx="4" fill="#0F2A44"/>
    <rect x="105" y="470" width="16" height="34" rx="4" fill="#0F2A44"/>
    <rect x="199" y="470" width="16" height="34" rx="4" fill="#0F2A44"/>
