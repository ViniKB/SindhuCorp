<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="chsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A5A86"/>
      <stop offset="100%" stop-color="#0F2A44"/>
    </linearGradient>
    <linearGradient id="chb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D9A8"/>
      <stop offset="100%" stop-color="#A6842F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#chsky)"/>
  <!-- Crescent accent -->
  <circle cx="680" cy="130" r="54" fill="#C9A24A" opacity=".28"/>
  <circle cx="700" cy="120" r="44" fill="#0F2A44" opacity=".9"/>
  <!-- Construction crane lines -->
  <g stroke="#C9A24A" stroke-width="2" opacity=".45" fill="none">
    <line x1="700" y1="40" x2="700" y2="240"/>
    <line x1="560" y1="80" x2="780" y2="80"/>
    <line x1="560" y1="80" x2="560" y2="180"/>
    <rect x="552" y="180" width="20" height="30" stroke-width="1"/>
  </g>
  <!-- Main tower -->
  <rect x="200" y="140" width="260" height="420" fill="url(#chb)"/>
  <rect x="200" y="140" width="260" height="16" fill="#8D6C29"/>
  <!-- Side building -->
  <rect x="470" y="240" width="180" height="320" fill="url(#chb)" opacity=".85"/>
  <rect x="470" y="240" width="180" height="14" fill="#8D6C29"/>
  <!-- Windows -->
  <g fill="#0F2A44" opacity=".6">
    <g id="cwf">
      <rect x="220" y="180" width="26" height="34"/>
      <rect x="258" y="180" width="26" height="34"/>
      <rect x="296" y="180" width="26" height="34"/>
      <rect x="334" y="180" width="26" height="34"/>
      <rect x="372" y="180" width="26" height="34"/>
      <rect x="410" y="180" width="26" height="34"/>
    </g>
    <use href="#cwf" y="50"/>
    <use href="#cwf" y="100"/>
    <use href="#cwf" y="150"/>
    <use href="#cwf" y="200"/>
    <use href="#cwf" y="250"/>
    <use href="#cwf" y="300"/>
    <use href="#cwf" y="350"/>
  </g>
  <g fill="#0F2A44" opacity=".55">
    <rect x="490" y="280" width="24" height="30"/>
    <rect x="524" y="280" width="24" height="30"/>
    <rect x="558" y="280" width="24" height="30"/>
    <rect x="592" y="280" width="24" height="30"/>
    <rect x="626" y="280" width="24" height="30"/>
    <rect x="490" y="320" width="24" height="30"/>
    <rect x="524" y="320" width="24" height="30"/>
    <rect x="558" y="320" width="24" height="30"/>
    <rect x="592" y="320" width="24" height="30"/>
    <rect x="626" y="320" width="24" height="30"/>
    <rect x="490" y="360" width="24" height="30"/>
    <rect x="524" y="360" width="24" height="30"/>
    <rect x="558" y="360" width="24" height="30"/>
    <rect x="592" y="360" width="24" height="30"/>
    <rect x="626" y="360" width="24" height="30"/>
    <rect x="490" y="400" width="24" height="30"/>
    <rect x="524" y="400" width="24" height="30"/>
    <rect x="558" y="400" width="24" height="30"/>
    <rect x="592" y="400" width="24" height="30"/>
    <rect x="626" y="400" width="24" height="30"/>
  </g>
  <!-- Scaffold overlay -->
  <g stroke="#C9A24A" stroke-width="2" opacity=".35" fill="none">
    <line x1="200" y1="300" x2="460" y2="300"/>
    <line x1="200" y1="400" x2="460" y2="400"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="560" width="800" height="40" fill="#0B1F34"/>
</svg>
